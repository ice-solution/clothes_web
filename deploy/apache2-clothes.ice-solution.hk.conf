# Apache2 VirtualHost：clothes.ice-solution.hk
# Cloudflare SSL：**彈性 (Flexible)** — 訪客 ↔ Cloudflare 為 HTTPS，Cloudflare ↔ 源站僅 **HTTP :80**
# 應用程式目錄：/var/www/clothes_website/（Node 監聽 127.0.0.1:3000）
#
# 啟用模組（Flexible 源站不需 SSL 模組即可運作）：
#   sudo a2enmod proxy proxy_http headers
#   sudo a2ensite clothes.ice-solution.hk.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# 重要：源站 **不要** 對 HTTP 做 301 轉到 HTTPS，否則易與 Flexible 行為衝突。
#
# Node .env：
#   BASE_URL=https://clothes.ice-solution.hk
#   TRUST_PROXY=1
#   PORT=3000
#
# 下方 RequestHeader X-Forwarded-Proto 讓應用程式知道「使用者實際是用 https 開啟」，QR 與 redirect 才會正確。

<VirtualHost *:80>
    ServerName clothes.ice-solution.hk
    DocumentRoot /var/www/clothes_website/public

    ProxyPreserveHost On
    # 訪客經 Cloudflare 為 HTTPS；源站收到的是 HTTP，需手動標記原始協定
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass        / http://127.0.0.1:3999/
    ProxyPassReverse / http://127.0.0.1:3999/

    ErrorLog ${APACHE_LOG_DIR}/clothes.ice-solution.hk-error.log
    CustomLog ${APACHE_LOG_DIR}/clothes.ice-solution.hk-access.log combined
</VirtualHost>

# --- 若日後改為 Cloudflare「完整／完整（嚴格）」並在源站啟用 TLS，請改為 ---
# - 在 :80 只保留 ACME 或關閉；在 :443 使用 SSLEngine + 憑證 + 同上 ProxyPass
# - 並啟用：sudo a2enmod ssl rewrite
# - 詳見 Cloudflare 文件「SSL/TLS」與源站憑證設定
